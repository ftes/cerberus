name: CI Profile

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  profile:
    name: Profile Tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      MIX_ENV: test
      CERBERUS_PROFILE: 1
      CERBERUS_PROFILE_COMPILE: 1
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup BEAM
        uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Cache deps and build
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-profile-${{ hashFiles('mix.lock', '.tool-versions') }}
          restore-keys: |
            ${{ runner.os }}-mix-profile-

      - name: Install deps
        run: mix deps.get

      - name: Cache browser runtimes
        uses: actions/cache@v5
        with:
          path: |
            tmp/chrome-*
            tmp/chromedriver-*
            tmp/firefox-*
          key: ${{ runner.os }}-browser-runtime-${{ hashFiles('bin/chrome.sh', 'bin/firefox.sh') }}
          restore-keys: |
            ${{ runner.os }}-browser-runtime-

      - name: Install browsers
        run: |
          mix cerberus.install.chrome
          mix cerberus.install.firefox

      - name: Profile tests with Chrome
        id: chrome_profile
        continue-on-error: true
        run: |
          set -o pipefail
          mkdir -p artifacts/chrome
          mix test --warnings-as-errors --slowest 50 2>&1 | tee artifacts/chrome/test.log
        env:
          CERBERUS_PROFILE_OUTPUT_DIR: artifacts/chrome

      - name: Profile tests with Firefox
        id: firefox_profile
        continue-on-error: true
        run: |
          set -o pipefail
          mkdir -p artifacts/firefox
          CERBERUS_BROWSER_NAME=firefox mix test --warnings-as-errors --slowest 50 2>&1 | tee artifacts/firefox/test.log
        env:
          CERBERUS_PROFILE_OUTPUT_DIR: artifacts/firefox

      - name: Upload profiling artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-profile-artifacts
          path: artifacts

      - name: Check profiling test outcomes
        if: always()
        run: |
          if [ "${{ steps.chrome_profile.outcome }}" != "success" ] || [ "${{ steps.firefox_profile.outcome }}" != "success" ]; then
            echo "Chrome profiling outcome: ${{ steps.chrome_profile.outcome }}"
            echo "Firefox profiling outcome: ${{ steps.firefox_profile.outcome }}"
            exit 1
          fi
